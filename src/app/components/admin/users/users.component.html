<div class="users-container">
  <p-toast></p-toast>
  <div class="content-card">
    <div class="card-header">
      <h2>Users</h2>
    </div>

    <p-table
      #dt
      [value]="users"
      [lazy]="true"
      (onLazyLoad)="loadUsers($event)"
      [paginator]="false"
      [rows]="pageSize"
      [totalRecords]="totalRecords"
      styleClass="p-datatable-custom"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Joined Date</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td><p-tableCheckbox [value]="user"></p-tableCheckbox></td>
          <td>
            <div class="user-info">
              <div class="avatar-placeholder">{{ user.name.charAt(0) }}</div>
              <span>{{ user.name }}</span>
            </div>
          </td>
          <td>{{ user.email }}</td>
          <td>{{ user.phoneNumber || 'N/A' }}</td>
          <td>
            <span class="role-badge" [class.role-admin]="user.role === 'Admin'">
              {{ user.role }}
            </span>
          </td>
          <td>{{ user.createdAt | date:'yyyy-M-d' }}</td>
        </tr>
      </ng-template>
    </p-table>

    <!-- Simplified Pagination Footer -->
  <div class="table-footer-custom mt-4" *ngIf="totalRecords > 0">
    <div class="total-count-display">
      <span>{{ totalRecords }}</span> Users
    </div>
    
    <div class="pagination-controls">
      <div class="page-buttons">
        <button class="page-btn prev" [disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)">
          <i class="pi pi-chevron-left"></i>
        </button>
        
        <ng-container *ngFor="let p of getPagesArray()">
          <button class="page-btn" [class.active]="p === currentPage" (click)="goToPage(p)">
            {{ p }}
          </button>
        </ng-container>

        <button class="page-btn next" [disabled]="currentPage === totalPages" (click)="goToPage(currentPage + 1)">
          <i class="pi pi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
  </div>
</div>
