<div class="users-container">
  <p-toast></p-toast>
  <div class="content-card">
    <div class="card-header">
      <h2>Users</h2>
    </div>

    <p-table
      #dt
      [value]="users"
      [lazy]="true"
      (onLazyLoad)="loadUsers($event)"
      [paginator]="false"
      [rows]="pageSize"
      [totalRecords]="totalRecords"
      styleClass="p-datatable-custom"
      responsiveLayout="scroll"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 3rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th><i class="pi pi-user header-icon"></i> Full Name</th>
          <th class="hidden-mobile"><i class="pi pi-envelope header-icon"></i> Email</th>
          <th class="hidden-mobile"><i class="pi pi-phone header-icon"></i> Phone</th>
          <th><i class="pi pi-briefcase header-icon"></i> Role</th>
          <th class="hidden-mobile"><i class="pi pi-clock header-icon"></i> Joined Date</th>
          <th style="width: 3rem"></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr class="user-row">
          <td><p-tableCheckbox [value]="user"></p-tableCheckbox></td>
          <td>
            <div class="user-info">
              <div class="avatar-placeholder-circle">{{ user.name.charAt(0) }}</div>
              <div class="user-details-mobile">
                <span class="user-name">{{ user.name }}</span>
                <span class="user-email-mobile visible-mobile">{{ user.email }}</span>
              </div>
            </div>
          </td>
          <td class="hidden-mobile"><span class="email-text">{{ user.email }}</span></td>
          <td class="hidden-mobile"><span class="phone-text">{{ user.phoneNumber || 'N/A' }}</span></td>
          <td>
            <span class="role-pill" [ngClass]="'role-' + user.role.toLowerCase()">
              {{ user.role }}
            </span>
          </td>
          <td class="hidden-mobile">
            <span class="created-date">{{ user.createdAt | date:'d MMM, yyyy' }}</span>
          </td>
          <td>
            <button pButton type="button" icon="pi pi-ellipsis-h" class="p-button-text p-button-secondary action-btn"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <!-- Simplified Pagination Footer -->
  <div class="table-footer-custom mt-4" *ngIf="totalRecords > 0">
    <div class="total-count-display">
      <span>{{ totalRecords }}</span> Users
    </div>
    
    <div class="pagination-controls">
      <div class="page-buttons">
        <button class="page-btn prev" [disabled]="currentPage === 1" (click)="goToPage(currentPage - 1)">
          <i class="pi pi-chevron-left"></i>
        </button>
        
        <ng-container *ngFor="let p of pagesArray">
          <button class="page-btn" [class.active]="p === currentPage" (click)="goToPage(p)">
            {{ p }}
          </button>
        </ng-container>

        <button class="page-btn next" [disabled]="currentPage === totalPages" (click)="goToPage(currentPage + 1)">
          <i class="pi pi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
  </div>
</div>
