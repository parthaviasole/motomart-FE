<div class="grid grid-nogutter min-h-screen">
    <div class="hidden lg:flex col-6 auth-bg flex-column justify-content-center align-items-center text-center p-6">
        <i class="pi pi-cog text-white text-8xl mb-4"></i>
        <h1 class="text-white text-6xl font-bold">Moto Parts</h1>
        <p class="text-white text-xl mt-2">Your one-stop shop for high-quality motorcycle parts.</p>
    </div>

    <div class="col-12 lg:col-6 flex flex-column justify-content-center align-items-center p-4 surface-ground">
        <p-toast></p-toast>
        <div class="w-full md:w-8 xl:w-6 p-fluid">
            <div class="text-center mb-5">
                <h1 class="text-4xl font-bold text-900">Reset Your Password</h1>
                <p class="text-600">Create a new, secure password for your account.</p>
            </div>

            <form #resetPasswordForm="ngForm" (ngSubmit)="onSubmit()">
                <p-floatlabel class="mb-3">
                    <p-password id="password" name="password" [(ngModel)]="resetData.newPassword" [toggleMask]="true" 
                        required #password="ngModel" [inputStyle]="{ width: '100%' }" [style]="{ width: '100%' }"
                        [feedback]="true"></p-password>
                    <label for="password">New Password</label>
                </p-floatlabel>
                <small class="p-error -mt-3 mb-3" *ngIf="password.invalid && password.touched">Password is required.</small>

                <p-floatlabel class="mb-3">
                    <p-password id="confirmPassword" name="confirmPassword" [(ngModel)]="resetData.confirmPassword" 
                        [feedback]="false" [toggleMask]="true" required #confirmPassword="ngModel"
                        [inputStyle]="{ width: '100%' }" [style]="{ width: '100%' }"></p-password>
                    <label for="confirmPassword">Confirm New Password</label>
                </p-floatlabel>
                <small class="p-error -mt-3 mb-3" *ngIf="confirmPassword.invalid && confirmPassword.touched">Confirmation is required.</small>
                <small class="p-error -mt-3 mb-3" *ngIf="resetData.newPassword !== resetData.confirmPassword && confirmPassword.touched">Passwords do not match.</small>

                <p-button label="Reset Password" type="submit" [loading]="loading" [disabled]="resetPasswordForm.invalid" class="w-full mt-4" styleClass="w-full p-3 font-bold"></p-button>
            </form>
        </div>
    </div>
</div>
