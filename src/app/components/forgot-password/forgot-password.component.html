<div class="grid grid-nogutter min-h-screen">
    <div class="hidden lg:flex col-6 auth-bg flex-column justify-content-center align-items-center text-center p-6">
        <i class="pi pi-cog text-white text-8xl mb-4"></i>
        <h1 class="text-white text-6xl font-bold">Moto Parts</h1>
        <p class="text-white text-xl mt-2">Your one-stop shop for high-quality motorcycle parts.</p>
    </div>

    <div class="col-12 lg:col-6 flex flex-column justify-content-center align-items-center p-4 surface-ground">
        <p-toast></p-toast>
        <div class="w-full md:w-8 xl:w-6 p-fluid">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-bold text-900 mb-3">Forgot Your Password?</h1>
                <p class="text-600 text-lg">Enter your email to receive a reset link.</p>
            </div>

            <form #forgotPasswordForm="ngForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-5">
                <p-floatlabel>
                    <input pInputText id="email" type="email" name="email" [(ngModel)]="email" required #emailField="ngModel" class="w-full" />
                    <label for="email">Email</label>
                </p-floatlabel>
                <small class="p-error -mt-4" *ngIf="emailField.invalid && emailField.touched">Email is required.</small>

                <p-button label="Send Reset Link" type="submit" [loading]="loading" [disabled]="forgotPasswordForm.invalid" class="w-full mt-3" styleClass="w-full p-3 font-bold"></p-button>

                <div class="text-center mt-3 text-600">
                    <span>Remember your password? </span>
                    <a routerLink="/login" class="text-primary no-underline font-bold hover:underline">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
